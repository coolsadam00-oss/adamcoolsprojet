<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Account - {{ site_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% if ui_accent %}<style>:root{--accent:{{ ui_accent }};}</style>{% endif %}
</head>
<body>
  <nav class="topbar">
    <div class="brand">{{ site_name }}</div>
    <div class="actions">
      <a class="btn" href="/">Back</a>
      <form method="post" action="/logout" class="inline-form"><button type="submit">Sign out</button></form>
    </div>
  </nav>

  <main class="account-main">
    <section class="account-panel">
      <h1>Your account</h1>
      <p class="muted">{{ current_user.email }}</p>
      <form method="post" action="/account/delete" class="danger-zone">
        <h2>Delete account</h2>
        <p>This removes your account and signs you out. It does not remove games from the website.</p>
        <button class="danger" type="submit">Delete my account</button>
      </form>
    </section>
  </main>
  <script src="/static/theme.js"></script>
</body>
</html>
