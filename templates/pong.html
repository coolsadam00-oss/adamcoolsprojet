<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Play Pong — {{ site_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="topbar">
    <div class="brand">{{ site_name }}</div>
    <div class="actions">
      <a class="btn" href="/">Back</a>
      <button id="themeToggle" class="theme-toggle" type="button">Toggle Theme</button>
    </div>
  </nav>

  <main class="pong-page">
    <section class="pong-header">
      <h1>Pong vs Bot</h1>
      <p>Use the arrow keys or W/S to move the left paddle. Beat the bot and play again!</p>
      <div class="pong-info">
        <span>Player: W/S</span>
        <span>Bot: right paddle</span>
        <span>Press Space to restart after game over</span>
      </div>
    </section>

    <div class="pong-container">
      <canvas id="pongCanvas" width="800" height="500"></canvas>
    </div>
  </main>

  <script src="/static/theme.js"></script>
  <script src="/static/pong.js"></script>
</body>
</html>
