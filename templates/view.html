<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ project.title }} — {{ site_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>iframe{width:100%;height:80vh;border:1px solid #444;border-radius:8px}</style>
</head>
<body>
  <nav class="topbar">
    <div class="brand">{{ site_name }}</div>
    <div class="actions">
      <a class="btn" href="/">Back</a>
      <button id="themeToggle" class="theme-toggle" type="button">Toggle Theme</button>
    </div>
  </nav>

  <main class="view-main">
    <div class="view-header">
      <h1>{{ project.title }}</h1>
      <p class="muted">{{ project.description }}</p>
    </div>
    {% if index_file %}
      <p><a class="btn small" href="/project_files/{{ project.id }}/{{ index_file }}" target="_blank">Open in new tab</a></p>
      <div class="iframe-wrap"><iframe src="/project_files/{{ project.id }}/{{ index_file }}"></iframe></div>
    {% else %}
      <p>No index.html found in this project. You can browse files <a href="/project_files/{{ project.id }}/">here</a>.</p>
    {% endif %}
  </main>
  <script src="/static/theme.js"></script>
</body>
</html>
