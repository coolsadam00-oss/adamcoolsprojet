<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Upload — {{ site_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="topbar">
    <div class="brand">{{ site_name }}</div>
    <div class="actions">
      <a class="btn" href="/">Back</a>
    </div>
  </nav>

  <main class="upload-main">
    <h2>Upload a new game</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flashes">
        {% for m in messages %}
          <li>{{ m }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post" enctype="multipart/form-data" class="upload-form">
      <label>Title<br><input name="title" required></label>
      <label>Description<br><textarea name="description"></textarea></label>
      <label>Tags (comma separated)<br><input name="tags"></label>
      <label>Project ZIP (must include an index.html)<br><input type="file" name="file" accept=".zip" required></label>
      <button type="submit">Upload</button>
    </form>
  </main>
</body>
</html>
