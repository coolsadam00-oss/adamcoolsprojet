<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Upload — {{ site_name }}</title>
  <link rel="icon" href="/static/site-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
  {% if ui_accent %}<style>:root{--accent:{{ ui_accent }};}</style>{% endif %}
</head>
<body>
  <nav class="topbar">
    <a class="brand brand-lockup" href="/"><img src="/static/site-icon.svg" alt=""> <span>{{ site_name }}</span></a>
    <div class="actions">
      <a class="btn" href="/">Back</a>
      <a class="btn" href="/admin">Admin</a>
      <button id="themeToggle" class="theme-toggle" type="button">Toggle Theme</button>
    </div>
  </nav>

  <main class="upload-main">
    <h2>Upload a 2D or 3D game</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flashes">
        {% for m in messages %}
          <li>{{ m }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post" enctype="multipart/form-data" class="upload-form">
      <label>Title<br><input name="title" required></label>
      <label>Description<br><textarea name="description"></textarea></label>
      <label>Tags (comma separated)<br><input name="tags"></label>
      <label>2D or 3D HTML5 game ZIP (must include an index.html)<br><input type="file" name="file" accept=".zip" required></label>
      <label>Thumbnail<br><input type="file" name="thumbnail" accept=".png,.jpg,.jpeg,.gif,.webp"></label>
      <button type="submit">Upload 2D / 3D Game</button>
    </form>
  </main>
  <script src="/static/theme.js"></script>
</body>
</html>
