<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Adam Games</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #fff;
    }
    main {
      width: min(420px, calc(100% - 40px));
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>Check your internet connection, then reopen Adam Games.</p>
  </main>

</html>
